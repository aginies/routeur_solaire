name: Build Firmware

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [esp32s3, esp32dev]
    name: Build ${{ matrix.env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'platformio.lock') }}
          path: |
            ~/.platformio
            .pio

      - name: PlatformIO build ${{ matrix.env }}
        run: |
          platformio run -e ${{ matrix.env }}

      - name: Upload firmware artifact ${{ matrix.env }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}-${{ matrix.env }}
          path: .pio/build/${{ matrix.env }}/firmware.bin
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | sed -n 2p)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=$(git rev-list --max-parents=0 HEAD)
            echo "=== Initial release ===" > /tmp/release_notes.md
          else
            echo "=== Changes since $LATEST_TAG ===" > /tmp/release_notes.md
          fi
          echo "" >> /tmp/release_notes.md
          while IFS= read -r commit; do
            if [[ "$commit" =~ ^feat: ]]; then
              echo "- :sparkles: ${commit#feat: }" >> /tmp/release_notes.md
            elif [[ "$commit" =~ ^fix: ]]; then
              echo "- :bug: ${commit#fix: }" >> /tmp/release_notes.md
            elif [[ "$commit" =~ ^docs: ]]; then
              echo "- :books: ${commit#docs: }" >> /tmp/release_notes.md
            elif [[ "$commit" =~ ^refactor: ]]; then
              echo "- :recycle: ${commit#refactor: }" >> /tmp/release_notes.md
            else
              echo "- :label: $commit" >> /tmp/release_notes.md
            fi
          done < <(git log "${LATEST_TAG:-HEAD}..HEAD" --pretty=format:"%s" --no-merges)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: artifacts

      - name: Rename firmware files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for dir in artifacts/firmware-*; do
            env=$(basename "$dir" | sed "s/firmware-${VERSION}//")
            mv "$dir/firmware.bin" "$dir/firmware-${VERSION}-${env}.bin"
          done
          ls -la artifacts/firmware-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Firmware ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/firmware-*/*.bin
          generate_release_notes: false
          make_latest: true
