<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#1f2937">Architecture Carte — ESP32-S3 Pin Map</text>

  <!-- ===== CENTRAL ESP32-S3 ===== -->
  <rect x="280" y="320" width="240" height="160" rx="16" fill="#3b82f6" stroke="#1d4ed8" stroke-width="3" filter="url(#sh)"/>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#ffffff">ESP32-S3</text>
  <text x="400" y="388" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#dbeafe">WROOM-1 N16R8</text>
  <text x="400" y="408" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#bfdbfe">16MB Flash + 8MB PSRAM</text>
  <text x="400" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#93c5fd">41-pin castellated</text>

  <!-- ===== PERIPHERALS (radial layout) ===== -->

  <!-- USB-C (top) -->
  <rect x="340" y="70" width="120" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <text x="400" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#92400e">🔌 USB-C</text>
  <text x="400" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a16207" font-style="italic">5V / D- IO19 / D+ IO20</text>
  <line x1="400" y1="130" x2="400" y2="320" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="410" y="230" font-family="system-ui,sans-serif" font-size="9" fill="#b45309" font-style="italic">5V / USB</text>

  <!-- AMS1117 LDO (top-left) -->
  <rect x="140" y="100" width="130" height="55" rx="10" fill="#fed7aa" stroke="#f97316" stroke-width="2" filter="url(#sh)"/>
  <text x="205" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#9a3412">⚡ AMS1117-3.3</text>
  <text x="205" y="142" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#b45309" font-style="italic">5V → 3.3V / 800mA</text>
  <line x1="270" y1="127" x2="280" y2="127" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="270" y1="127" x2="340" y2="340" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="310" y="240" font-family="system-ui,sans-serif" font-size="9" fill="#b45309" font-style="italic">3.3V</text>

  <!-- JSY-MK-194 (left-top) -->
  <rect x="30" y="230" width="150" height="70" rx="10" fill="#fef3c7" stroke="#eab308" stroke-width="2" filter="url(#sh)"/>
  <text x="105" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#854d0e">⚡ JSY-MK-194G</text>
  <text x="105" y="274" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a16207">UART1: TX=IO5, RX=IO4</text>
  <text x="105" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#a16207" font-style="italic">ZX=IO15 / Modbus-RTU</text>
  <line x1="180" y1="265" x2="280" y2="370" stroke="#eab308" stroke-width="1.5"/>
  <text x="210" y="310" font-family="system-ui,sans-serif" font-size="9" fill="#a16207" font-style="italic">UART1/ZX</text>

  <!-- SSR (left-bottom) -->
  <rect x="30" y="430" width="150" height="70" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <text x="105" y="456" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🔌 SSR (Triac)</text>
  <text x="105" y="474" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">IO17 — PWM 0-100%</text>
  <text x="105" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#166534" font-style="italic">→ Chauffe-eau</text>
  <line x1="180" y1="465" x2="280" y2="430" stroke="#22c55e" stroke-width="1.5"/>
  <text x="215" y="455" font-family="system-ui,sans-serif" font-size="9" fill="#166534">IO17</text>

  <!-- Relay (bottom-left) -->
  <rect x="30" y="540" width="150" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="105" y="566" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🔒 Relais Sécurité</text>
  <text x="105" y="584" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">IO6 — fail-safe</text>
  <text x="105" y="600" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#166534" font-style="italic">5V / GND / Signal</text>
  <line x1="180" y1="575" x2="280" y2="450" stroke="#16a34a" stroke-width="1.5"/>
  <text x="210" y="520" font-family="system-ui,sans-serif" font-size="9" fill="#166534">IO6</text>

  <!-- DS18B20 (bottom) -->
  <rect x="280" y="580" width="150" height="70" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" filter="url(#sh)"/>
  <text x="355" y="606" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">🌡️ DS18B20</text>
  <text x="355" y="624" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#334155">IO16 — 1-Wire</text>
  <text x="355" y="640" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#334155" font-style="italic">Temp dissipateur SSR</text>
  <line x1="355" y1="580" x2="355" y2="480" stroke="#64748b" stroke-width="1.5"/>
  <text x="365" y="535" font-family="system-ui,sans-serif" font-size="9" fill="#334155">IO16</text>

  <!-- Fan (bottom-right) -->
  <rect x="520" y="540" width="150" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="595" y="566" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🌀 Ventilateur</text>
  <text x="595" y="584" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">IO18 — PWM 5V</text>
  <text x="595" y="600" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#166534" font-style="italic">Refroidissement SSR</text>
  <line x1="520" y1="575" x2="520" y2="450" stroke="#16a34a" stroke-width="1.5"/>
  <text x="500" y="520" font-family="system-ui,sans-serif" font-size="9" fill="#166534">IO18</text>

  <!-- LED WS2812 (right-top) -->
  <rect x="620" y="230" width="150" height="70" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <text x="695" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5b21b6">💡 LED WS2812</text>
  <text x="695" y="274" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5b21b6">IO48 — NeoPixel</text>
  <text x="695" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#5b21b6" font-style="italic">Statut système</text>
  <line x1="620" y1="265" x2="520" y2="370" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="315" font-family="system-ui,sans-serif" font-size="9" fill="#5b21b6">IO48</text>

  <!-- LCD I2C (right) -->
  <rect x="620" y="430" width="150" height="70" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <text x="695" y="456" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5b21b6">📟 LCD 1602A I2C</text>
  <text x="695" y="474" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5b21b6">SDA=IO8, SCL=IO9</text>
  <text x="695" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#5b21b6" font-style="italic">PCF8574 / 0x27</text>
  <line x1="620" y1="465" x2="520" y2="430" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="455" font-family="system-ui,sans-serif" font-size="9" fill="#5b21b6">I2C</text>

  <!-- Power rail indicators -->
  <rect x="12" y="100" width="18" height="510" rx="4" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="21" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#92400e" transform="rotate(-90, 21, 360)" font-weight="600">5V / 3.3V</text>

  <rect x="770" y="100" width="18" height="510" rx="4" fill="#94a3b8" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="779" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#475569" transform="rotate(90, 779, 360)" font-weight="600">GND</text>

</svg>
