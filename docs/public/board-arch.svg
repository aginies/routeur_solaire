<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="100%" height="100%">
  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
    <filter id="sh2" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#1f2937">Architecture Carte (PCB)</text>

  <!-- ===== Power chain: top to center ===== -->
  <!-- USB-C -->
  <rect x="370" y="45" width="160" height="55" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#sh2)"/>
  <text x="450" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#92400e">🔌 USB-C</text>
  <text x="450" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a16207" font-style="italic">5V / Serial</text>

  <!-- Arrow down -->
  <line x1="450" y1="100" x2="450" y2="118" stroke="#4b5563" stroke-width="2" marker-end="url(#ah2)"/>

  <!-- LDO -->
  <rect x="370" y="118" width="160" height="55" rx="10" fill="#fed7aa" stroke="#f97316" stroke-width="2" filter="url(#sh2)"/>
  <text x="450" y="141" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#9a3412">⚡ AMS1117-3.3</text>
  <text x="450" y="157" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#b45309" font-style="italic">5V → 3.3V / 800mA</text>

  <!-- Arrow down -->
  <line x1="450" y1="173" x2="450" y2="195" stroke="#4b5563" stroke-width="2" marker-end="url(#ah2)"/>

  <!-- ESP32-S3 (center, prominent) -->
  <rect x="330" y="195" width="240" height="90" rx="14" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2.5" filter="url(#sh2)"/>
  <text x="450" y="223" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#ffffff">🖥️ ESP32-S3</text>
  <text x="450" y="243" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#dbeafe">WROOM-1 N16R8</text>
  <text x="450" y="261" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#bfdbfe">16MB Flash + 8MB PSRAM</text>

  <!-- ===== Peripherals: left side ===== -->
  <!-- JSY meter (left) -->
  <line x1="330" y1="240" x2="275" y2="240" stroke="#4b5563" stroke-width="2" marker-end="url(#ah2)"/>
  <rect x="40" y="205" width="230" height="70" rx="10" fill="#fef3c7" stroke="#eab308" stroke-width="2" filter="url(#sh2)"/>
  <text x="155" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#854d0e">⚡ JSY-MK-194G</text>
  <text x="155" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a16207">UART1 (IO4/RX, IO5/TX)</text>
  <text x="155" y="264" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#a16207" font-style="italic">Modbus-RTU / ZX</text>

  <!-- SSR (right) -->
  <line x1="570" y1="240" x2="625" y2="240" stroke="#4b5563" stroke-width="2" marker-end="url(#ah2)"/>
  <rect x="630" y="205" width="230" height="70" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sh2)"/>
  <text x="745" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🔌 SSR (Triac)</text>
  <text x="745" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">IO17 / 0-100% PID</text>
  <text x="745" y="264" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#166534" font-style="italic">→ Chauffe-eau</text>

  <!-- ===== Bottom row: Relay+Fan and DS18B20 ===== -->
  <!-- Arrow down-left -->
  <line x1="400" y1="285" x2="275" y2="310" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah2)"/>
  <rect x="40" y="305" width="230" height="60" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#sh2)"/>
  <text x="155" y="328" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🔒 Relais Sécurité + Ventilateur</text>
  <text x="155" y="346" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">IO6 (Relay) / IO7 (Fan PWM)</text>

  <!-- Arrow down-right -->
  <line x1="500" y1="285" x2="625" y2="310" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah2)"/>
  <rect x="630" y="305" width="230" height="60" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" filter="url(#sh2)"/>
  <text x="745" y="328" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">🌡️ DS18B20 (Température)</text>
  <text x="745" y="346" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#334155">IO16 / 1-Wire / Pull-up 4.7kΩ</text>

  <!-- Power rail label (left edge) -->
  <rect x="12" y="45" width="20" height="320" rx="4" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="22" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#92400e" transform="rotate(-90, 22, 210)" font-weight="600">5V / 3.3V</text>

  <!-- Ground rail label (right edge) -->
  <rect x="868" y="45" width="20" height="320" rx="4" fill="#94a3b8" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="878" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#475569" transform="rotate(90, 878, 210)" font-weight="600">GND</text>

</svg>
