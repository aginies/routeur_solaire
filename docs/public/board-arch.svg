<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="100%" height="100%">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="ah-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="ah-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#38bdf8"/>
    </marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="esp-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="pwr-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="#0f172a" rx="8"/>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Architecture PCB — Routeur Solaire</text>
  <line x1="380" y1="36" x2="820" y2="36" stroke="#334155" stroke-width="1"/>

  <!-- ===== POWER INPUT (top center) ===== -->
  <rect x="490" y="48" width="220" height="44" rx="8" fill="#422006" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fbbf24">USB-C J1</text>
  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#d97706">5V + USB Serial</text>

  <!-- D1 ESD -->
  <rect x="555" y="96" width="90" height="28" rx="5" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="600" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#cbd5e1">D1 PRTR5V0U2X</text>
  <line x1="600" y1="92" x2="600" y2="96" stroke="#64748b" stroke-width="1.5"/>
  <line x1="600" y1="124" x2="600" y2="160" stroke="#64748b" stroke-width="1.5"/>

  <!-- F1 Polyfuse -->
  <rect x="555" y="160" width="90" height="28" rx="5" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="600" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#cbd5e1">F1 500mA</text>
  <line x1="600" y1="188" x2="600" y2="220" stroke="#f59e0b" stroke-width="2"/>

  <!-- ===== LDO (center top) ===== -->
  <rect x="470" y="220" width="260" height="48" rx="10" fill="url(#pwr-grad)" stroke="#d97706" stroke-width="2" filter="url(#sh)"/>
  <text x="600" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">AMS1117-3.3 U3</text>
  <text x="600" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#fef3c7">5V → 3.3V / 800mA</text>

  <!-- C1 -->
  <rect x="175" y="230" width="90" height="32" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="1"/>
  <text x="220" y="249" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#fbbf24">C1 10µF</text>
  <text x="220" y="261" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#d97706">5V→GND</text>
  <line x1="265" y1="246" x2="470" y2="246" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- C2 -->
  <rect x="175" y="268" width="90" height="32" rx="6" fill="#431407" stroke="#f97316" stroke-width="1"/>
  <text x="220" y="287" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#fb923c">C2 10µF</text>
  <text x="220" y="299" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#ea580c">3.3V→GND</text>
  <line x1="265" y1="284" x2="470" y2="284" stroke="#ea580c" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 3.3V rail to ESP -->
  <line x1="600" y1="268" x2="600" y2="320" stroke="#ea580c" stroke-width="2"/>
  <text x="610" y="300" font-family="system-ui,sans-serif" font-size="8" fill="#ea580c" font-weight="600">3.3V</text>

  <!-- ===== ESP32-S3 (center) ===== -->
  <rect x="420" y="320" width="360" height="120" rx="14" fill="url(#esp-grad)" stroke="#60a5fa" stroke-width="2.5" filter="url(#sh)"/>
  <text x="600" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#fff">ESP32-S3</text>
  <text x="600" y="368" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#dbeafe">N16R8 · 16MB Flash · 8MB PSRAM</text>
  <text x="600" y="384" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#93c5fd">WiFi + BLE · Native USB IO19/IO20</text>
  <text x="600" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#93c5fd">UART1: TX→IO5 · RX→IO4</text>
  <text x="600" y="428" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#bfdbfe">I2C: SDA→IO8 · SCL→IO9 · LED→IO48</text>

  <!-- ===== JSY METER (left, inset from rail) ===== -->
  <rect x="50" y="340" width="200" height="64" rx="10" fill="#422006" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <text x="150" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fbbf24">⚡ JSY-MK-194G</text>
  <text x="150" y="376" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#d97706">Compteur énergie</text>
  <text x="150" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#b45309">Modbus-RTU · 2 canaux</text>
  <text x="150" y="402" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#f59e0b">TX→IO5 RX→IO4 ZX→IO15</text>
  <line x1="250" y1="372" x2="420" y2="372" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#ah-amber)"/>

  <!-- ===== SSR (right, inset from rail) ===== -->
  <rect x="950" y="340" width="200" height="64" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <text x="1050" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#4ade80">🔌 SSR</text>
  <text x="1050" y="376" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">Chauffe-eau</text>
  <text x="1050" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4ade80">PWM 0-100% · IO17</text>
  <text x="1050" y="402" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#86efac">Burst / Cycle / Bresenham</text>
  <line x1="780" y1="372" x2="950" y2="372" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ah-green)"/>

  <!-- ===== RELAY (right below SSR) ===== -->
  <rect x="950" y="414" width="200" height="54" rx="10" fill="#14532d" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1050" y="434" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4ade80">🛡️ Relais</text>
  <text x="1050" y="450" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">IO6 · 5V</text>
  <text x="1050" y="462" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#86efac">Fault / Nuit</text>
  <line x1="780" y1="390" x2="950" y2="430" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ah-green)"/>

  <!-- ===== FAN (right below relay) ===== -->
  <rect x="950" y="478" width="200" height="54" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1050" y="498" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#4ade80">🌀 Fan 4010</text>
  <text x="1050" y="514" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">IO18 · PWM</text>
  <text x="1050" y="526" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#86efac">Refroid. SSR</text>
  <line x1="780" y1="405" x2="950" y2="490" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ah-green)"/>

  <!-- ===== TEMP SENSOR (left below JSY) ===== -->
  <rect x="50" y="420" width="200" height="54" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="150" y="440" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#cbd5e1">🌡️ DS18B20</text>
  <text x="150" y="456" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">IO16 · 1-Wire</text>
  <text x="150" y="468" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">Temp dissipateur</text>
  <line x1="250" y1="447" x2="420" y2="410" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ===== LCD (right bottom) ===== -->
  <rect x="950" y="542" width="200" height="54" rx="10" fill="#083344" stroke="#06b6d4" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1050" y="562" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#22d3ee">🖥️ LCD 1602A</text>
  <text x="1050" y="578" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#06b6d4">I2C · SDA→IO8 SCL→IO9</text>
  <text x="1050" y="590" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#67e8f9">PCF8574 · 0x27/0x3F</text>
  <line x1="780" y1="420" x2="950" y2="555" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#ah-blue)"/>

  <!-- ===== BOOT/RESET (left bottom) ===== -->
  <rect x="50" y="494" width="200" height="64" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="150" y="514" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#cbd5e1">⚙️ Boutons</text>
  <text x="150" y="530" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">SW1: IO0→GND Flash</text>
  <text x="150" y="544" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">SW2: EN→GND Reset</text>
  <text x="150" y="556" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#64748b">R1,R2 10kΩ pull-up</text>
  <line x1="250" y1="526" x2="420" y2="430" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah)"/>

  <!-- ===== IO46 WARNING (left bottom) ===== -->
  <rect x="50" y="568" width="200" height="40" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="150" y="586" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#f87171">⚠ IO46 → R3 10kΩ → GND</text>
  <text x="150" y="598" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#ef4444">Strapping mandatory LOW</text>
  <line x1="250" y1="578" x2="420" y2="440" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah)"/>

  <!-- ===== 5V RAIL (far left, rail at x=25 so text at x=33 is visible) ===== -->
  <rect x="25" y="180" width="16" height="400" rx="4" fill="#422006" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="33" y="380" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#fbbf24" transform="rotate(-90, 33, 380)" font-weight="600">5V</text>
  <line x1="600" y1="188" x2="41" y2="188" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="150" y1="360" x2="41" y2="360" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="150" y1="440" x2="41" y2="440" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="1050" y1="510" x2="41" y2="510" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== 3.3V RAIL (far right, rail at x=1159 so text at x=1167 is visible) ===== -->
  <rect x="1159" y="240" width="16" height="360" rx="4" fill="#431407" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1167" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#fb923c" transform="rotate(90, 1167, 420)" font-weight="600">3.3V</text>

  <!-- 3.3V connections from LDO and peripherals to right bus -->
  <line x1="600" y1="284" x2="1159" y2="284" stroke="#ea580c" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- ESP32 3.3V connection stops at ESP right edge (x=780) -->
  <line x1="780" y1="350" x2="1159" y2="350" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="1050" y1="560" x2="1159" y2="560" stroke="#ea580c" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== GND RAIL (bottom horizontal bus) ===== -->
  <rect x="25" y="620" width="1134" height="18" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="600" y="633" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" font-weight="600">GND — PLAN COMMUN</text>
  <line x1="150" y1="608" x2="150" y2="620" stroke="#475569" stroke-width="1"/>
  <line x1="600" y1="440" x2="600" y2="620" stroke="#475569" stroke-width="1" stroke-dasharray="2,4" opacity="0.3"/>
  <line x1="1050" y1="596" x2="1050" y2="620" stroke="#475569" stroke-width="1"/>

  <!-- ===== LEGEND ===== -->
  <line x1="200" y1="655" x2="1000" y2="655" stroke="#334155" stroke-width="1"/>

  <rect x="220" y="668" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="236" y="677" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">5V</text>

  <rect x="270" y="668" width="10" height="10" rx="2" fill="#ea580c"/>
  <text x="286" y="677" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">3.3V</text>

  <rect x="325" y="668" width="10" height="10" rx="2" fill="#475569"/>
  <text x="341" y="677" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">GND</text>

  <line x1="390" y1="673" x2="415" y2="673" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#ah-amber)"/>
  <text x="422" y="677" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">UART</text>

  <line x1="480" y1="673" x2="505" y2="673" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ah-green)"/>
  <text x="512" y="677" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">PWM</text>

  <line x1="565" y1="673" x2="590" y2="673" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="597" y="677" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">Boot</text>

  <line x1="645" y1="673" x2="670" y2="673" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#ah-blue)"/>
  <text x="677" y="677" font-family="system-ui,sans-serif" font-size="8" fill="#94a3b8">I2C</text>

  <!-- Notes -->
  <text x="600" y="700" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#64748b" font-style="italic">C3-C8: 6× 100nF · R1/R2: 10kΩ pull-up · R4: 4.7kΩ DS18B20 · R5/R6: 5.1kΩ CC USB-C</text>

</svg>
