<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1f2937">Architecture Système</text>

  <!-- Solar panels block -->
  <rect x="20" y="60" width="160" height="100" rx="12" fill="#fef9c3" stroke="#eab308" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#854d0e">☀️ Panneaux Solaires</text>
  <text x="100" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#854d0e">Puissance DC</text>
  <text x="100" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#854d0e" font-style="italic">→ Réseau</text>

  <!-- Arrow: Solar → Meter -->
  <line x1="180" y1="110" x2="210" y2="110" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Meter block -->
  <rect x="215" y="60" width="160" height="100" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="295" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">⚡ Compteur Énergie</text>
  <text x="295" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#92400e">JSY-MK-194 ou Shelly</text>
  <text x="295" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e" font-style="italic">Mesure import/export</text>

  <!-- Arrow: Meter → ESP32 -->
  <line x1="375" y1="110" x2="405" y2="110" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ESP32-S3 block (center, larger) -->
  <rect x="410" y="40" width="190" height="140" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="505" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e40af">🖥️ ESP32-S3</text>
  <text x="505" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">• PID Control</text>
  <text x="505" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">• Safety State Machine</text>
  <text x="505" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">• Météo (Open-Meteo)</text>
  <text x="505" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">• Web Server</text>
  <text x="505" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">• MQTT Broker</text>

  <!-- Arrow: ESP32 → SSR/Load -->
  <line x1="505" y1="180" x2="505" y2="210" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- SSR block -->
  <rect x="430" y="210" width="150" height="70" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="505" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#166534">🔌 SSR (Triac)</text>
  <text x="505" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#166534">Régulation 0-100%</text>

  <!-- Arrow: SSR → Load -->
  <line x1="505" y1="280" x2="505" y2="310" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Load block -->
  <rect x="430" y="310" width="150" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="505" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#166534">🚿 Chauffe-eau</text>
  <text x="505" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#166534">Charge résistive</text>

  <!-- Equipment 2 branch from ESP32 -->
  <line x1="600" y1="110" x2="630" y2="110" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="635" y="75" width="140" height="70" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="705" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#166534">🏊 Équipement 2</text>
  <text x="705" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">Pompe / Radiateur</text>
  <text x="705" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#166534" font-style="italic">On/Off / Priorité</text>

  <!-- Web Dashboard from ESP32 -->
  <line x1="410" y1="110" x2="340" y2="110" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="200" y="75" width="130" height="70" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="265" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#5b21b6">🌐 Dashboard Web</text>
  <text x="265" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#5b21b6">uPlot.js / Stats</text>
  <text x="265" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5b21b6" font-style="italic">Configuration</text>

  <!-- MQTT from ESP32 -->
  <line x1="410" y1="140" x2="340" y2="140" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="200" y="155" width="130" height="70" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="265" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#166534">🏠 MQTT / HA</text>
  <text x="265" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">Home Assistant</text>
  <text x="265" y="216" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#166534" font-style="italic">Discovery auto</text>

  <!-- Weather API -->
  <line x1="600" y1="140" x2="670" y2="170" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="675" y="165" width="110" height="65" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155">☁️ Open-Meteo</text>
  <text x="730" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">API Météo</text>
  <text x="730" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155" font-style="italic">HTTPS / 9min</text>

  <!-- Temperature sensor -->
  <line x1="600" y1="170" x2="670" y2="210" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="675" y="215" width="110" height="65" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155">🌡️ DS18B20</text>
  <text x="730" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">1-Wire</text>
  <text x="730" y="274" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155" font-style="italic">Temp SSR</text>

  <!-- Feedback arrow: Load → Meter (power measured) -->
  <path d="M 395 110 L 395 220 L 215 220" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="305" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" font-style="italic">Puissance mesurée</text>

</svg>
