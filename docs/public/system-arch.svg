<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="100%" height="100%">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#1f2937">Architecture Système</text>

  <!-- ===== ROW 1: Inputs ===== -->
  <!-- Solar Panels -->
  <rect x="20" y="50" width="145" height="85" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="2" filter="url(#sh)"/>
  <text x="92" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#854d0e">☀️ Panneaux</text>
  <text x="92" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#854d0e">Puissance DC</text>
  <text x="92" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a16207" font-style="italic">→ Réseau</text>

  <!-- Arrow -->
  <line x1="165" y1="92" x2="190" y2="92" stroke="#4b5563" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Meter -->
  <rect x="195" y="50" width="145" height="85" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <text x="267" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#92400e">⚡ Compteur</text>
  <text x="267" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#92400e">JSY-MK-194 / Shelly</text>
  <text x="267" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a16207" font-style="italic">Mesure import/export</text>

  <!-- Arrow -->
  <line x1="340" y1="92" x2="365" y2="92" stroke="#4b5563" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ESP32-S3 (center) -->
  <rect x="370" y="35" width="185" height="115" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5" filter="url(#sh)"/>
  <text x="462" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e40af">🖥️ ESP32-S3</text>
  <text x="462" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">• PID Control</text>
  <text x="462" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">• Safety State Machine</text>
  <text x="462" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">• Météo &amp; Mqtt</text>

  <!-- ===== ROW 2: Outputs from ESP32 ===== -->
  <!-- SSR block (down arrow) -->
  <line x1="462" y1="150" x2="462" y2="175" stroke="#4b5563" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="370" y="175" width="185" height="60" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <text x="462" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🔌 SSR (Triac)</text>
  <text x="462" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534" font-style="italic">Régulation 0-100%</text>

  <!-- Arrow: SSR → Load -->
  <line x1="462" y1="235" x2="462" y2="255" stroke="#4b5563" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="370" y="255" width="185" height="55" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="462" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🚿 Chauffe-eau</text>
  <text x="462" y="297" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534" font-style="italic">Charge résistive</text>

  <!-- Eq2 branch (right) -->
  <line x1="555" y1="92" x2="585" y2="92" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="590" y="62" width="135" height="60" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <text x="657" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🏊 Équipement 2</text>
  <text x="657" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534" font-style="italic">Pompe / Radiateur</text>

  <!-- Web Dashboard (left) -->
  <line x1="370" y1="92" x2="305" y2="92" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="170" y="62" width="130" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <text x="235" y="86" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5b21b6">🌐 Dashboard Web</text>
  <text x="235" y="104" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5b21b6" font-style="italic">uPlot.js / Stats</text>

  <!-- MQTT (left below Web) -->
  <line x1="235" y1="122" x2="235" y2="140" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="170" y="140" width="130" height="60" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <text x="235" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🏠 MQTT / HA</text>
  <text x="235" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534" font-style="italic">Discovery auto</text>

  <!-- Weather API (right) -->
  <line x1="555" y1="125" x2="620" y2="155" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="625" y="145" width="120" height="55" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" filter="url(#sh)"/>
  <text x="685" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">☁️ Open-Meteo</text>
  <text x="685" y="186" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#334155" font-style="italic">HTTPS / 9min</text>

  <!-- DS18B20 (right below weather) -->
  <line x1="685" y1="200" x2="685" y2="220" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="625" y="220" width="120" height="55" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" filter="url(#sh)"/>
  <text x="685" y="243" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">🌡️ DS18B20</text>
  <text x="685" y="261" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#334155" font-style="italic">1-Wire / Temp SSR</text>

  <!-- Feedback loop: Load → Meter -->
  <path d="M 340 282 L 340 200 L 195 200" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ah)"/>
  <text x="267" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" font-style="italic">↺ Puissance mesurée</text>

</svg>
