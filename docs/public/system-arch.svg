<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" width="100%" height="100%">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#1f2937">Architecture Système</text>

  <!-- ===== ROW 1: Inputs ===== -->
  <!-- Solar Panels -->
  <rect x="20" y="50" width="140" height="80" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="2" filter="url(#sh)"/>
  <text x="90" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#854d0e">☀️ Panneaux</text>
  <text x="90" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#854d0e">Puissance DC</text>
  <text x="90" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a16207" font-style="italic">→ Réseau</text>

  <!-- Arrow -->
  <line x1="160" y1="90" x2="185" y2="90" stroke="#4b5563" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Meter -->
  <rect x="190" y="50" width="140" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <text x="260" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#92400e">⚡ Compteur</text>
  <text x="260" y="94" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#92400e">JSY-MK-194 / Shelly</text>
  <text x="260" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a16207" font-style="italic">Mesure import/export</text>

  <!-- Arrow -->
  <line x1="330" y1="90" x2="355" y2="90" stroke="#4b5563" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ESP32-S3 (center) -->
  <rect x="360" y="35" width="180" height="110" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5" filter="url(#sh)"/>
  <text x="450" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1e40af">🖥️ ESP32-S3</text>
  <text x="450" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">• PID Control</text>
  <text x="450" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">• Safety State Machine</text>
  <text x="450" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">• Météo &amp; MQTT</text>

  <!-- ===== ROW 2: Outputs from ESP32 ===== -->
  <!-- SSR block (down arrow) -->
  <line x1="450" y1="145" x2="450" y2="170" stroke="#4b5563" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="360" y="170" width="180" height="55" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <text x="450" y="194" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🔌 SSR (Triac)</text>
  <text x="450" y="212" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534" font-style="italic">Régulation 0-100%</text>

  <!-- Arrow: SSR → Load -->
  <line x1="450" y1="225" x2="450" y2="245" stroke="#4b5563" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="360" y="245" width="180" height="50" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
  <text x="450" y="270" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🚿 Chauffe-eau</text>

  <!-- Eq2 branch (right) - moved down to avoid overlap -->
  <line x1="540" y1="90" x2="570" y2="90" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="575" y="140" width="130" height="55" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <text x="640" y="163" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🏊 Équipement 2</text>
  <text x="640" y="181" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534" font-style="italic">Pompe / Radiateur</text>

  <!-- Web Dashboard (left) - moved down to avoid overlap -->
  <line x1="360" y1="90" x2="295" y2="90" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="165" y="140" width="125" height="55" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <text x="227" y="163" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#5b21b6">🌐 Dashboard Web</text>
  <text x="227" y="181" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5b21b6" font-style="italic">uPlot.js / Stats</text>

  <!-- MQTT (below Web Dashboard) -->
  <line x1="227" y1="195" x2="227" y2="210" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="165" y="210" width="125" height="55" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <text x="227" y="233" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#166534">🏠 MQTT / HA</text>
  <text x="227" y="251" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534" font-style="italic">Discovery auto</text>

  <!-- Weather API (right, below Eq2) -->
  <line x1="640" y1="195" x2="640" y2="210" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="575" y="210" width="130" height="55" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" filter="url(#sh)"/>
  <text x="640" y="233" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">☁️ Open-Meteo</text>
  <text x="640" y="251" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#334155" font-style="italic">HTTPS / 9min</text>

  <!-- DS18B20 (right, below Weather) -->
  <line x1="640" y1="265" x2="640" y2="280" stroke="#4b5563" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="575" y="280" width="130" height="55" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2" filter="url(#sh)"/>
  <text x="640" y="303" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#334155">🌡️ DS18B20</text>
  <text x="640" y="321" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#334155" font-style="italic">1-Wire / Temp dissipateur SSR</text>

  <!-- Feedback loop: Load → Meter (routed to avoid overlap) -->
  <path d="M 340 270 L 340 330 L 190 330" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ah)"/>
  <text x="265" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8" font-style="italic">↺ Puissance mesurée</text>

</svg>
