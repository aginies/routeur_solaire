[platformio]
default_envs = esp32s3
src_dir = src
include_dir = include
data_dir = data

[env]
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
    esphome/AsyncTCP-esphome @ ^2.1.3
    bertmelis/espMqttClient
    paulstoffregen/OneWire @ ^2.3.7
    milesburton/DallasTemperature @ ^3.9.1
    adafruit/Adafruit NeoPixel @ ^1.12.0
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ASYNC_TCP_USE_WDT=0
    -D CONFIG_ASYNC_TCP_STACK_SIZE=16384
    -D CONFIG_ASYNC_TCP_PRIORITY=5
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
    -D CONFIG_LWIP_MAX_ACTIVE_TCP=16
    -D CONFIG_LWIP_MAX_LISTENING_TCP=16
    -std=gnu++17

build_unflags = -std=gnu++11
lib_ignore = 
    AsyncTCP

[env:esp32s3]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
; Board variant preconfigures 16 MB QIO flash + 8 MB OPI PSRAM (matches ESP32-S3 N16R8).
; The variant also sets ARDUINO_USB_CDC_ON_BOOT=1, which would route Serial to the
; native USB-OTG port (/dev/ttyACMx). We unflag and redefine to 0 so Serial keeps
; using the UART0 / USB-to-serial bridge (/dev/ttyUSB0) — matches the existing
; flash.sh -m workflow. build_unflags avoids the "redefined" warning.
build_unflags =
    -std=gnu++11
    -DARDUINO_USB_CDC_ON_BOOT=1
build_flags =
    ${env.build_flags}
    -D BOARD_HAS_PSRAM
    -D MAX_STATS_DAYS=365
    -D ARDUINO_USB_CDC_ON_BOOT=0

[env:esp32dev]
platform = espressif32
board = esp32dev
board_build.mcu = esp32
build_unflags =
    ${env.build_unflags}
    -D CONFIG_ASYNC_TCP_STACK_SIZE=16384
    -D CONFIG_LWIP_MAX_ACTIVE_TCP=16
    -D CONFIG_LWIP_MAX_LISTENING_TCP=16
build_flags =
    ${env.build_flags}
    -D DISABLE_STATS
    -D DISABLE_HISTORY
    -D DISABLE_DATA_LOG
    -D MAX_STATS_DAYS=1
    -D CONFIG_ASYNC_TCP_STACK_SIZE=8192
    -D CONFIG_LWIP_MAX_ACTIVE_TCP=8
    -D CONFIG_LWIP_MAX_LISTENING_TCP=8

[env:native]
platform = native
test_framework = unity
framework = 
lib_deps = 
lib_ldf_mode = chain+
build_flags = -D NATIVE_TEST
lib_ignore = 
    ESPAsyncWebServer
    AsyncTCP
    espMqttClient
    OneWire
    DallasTemperature
    Adafruit NeoPixel
